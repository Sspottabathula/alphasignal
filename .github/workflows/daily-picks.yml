name: Daily Stock Picks

on:
  schedule:
    # Arizona (MST) = UTC-7 year-round (no DST)
    # Target: 8:30 AM MST = 15:30 UTC  →  well before 9:30 AM ET market open
    - cron: '30 15 * * 1-5'
  workflow_dispatch:  # allows manual trigger from GitHub UI

jobs:
  generate-picks:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install anthropic requests

      - name: Generate today's picks
        run: python generate_picks.py
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          PUSHOVER_TOKEN: ${{ secrets.PUSHOVER_TOKEN }}
          PUSHOVER_USER: ${{ secrets.PUSHOVER_USER }}

      - name: Commit and push picks.json
        run: |
          git config user.name "AlphaSignal Bot"
          git config user.email "alphasignal-bot@users.noreply.github.com"
          git add picks.json
          git diff --staged --quiet || git commit -m "Daily picks $(date -u +%Y-%m-%d)"
          git push
